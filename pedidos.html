<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pedidos - Freddy Fazbear Pizza</title>
  <style>
      body{
    background-image: url("bg_img.jpg");
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;
    }
    /*Navbar*/
    * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    }
    .nav_links li, a, button {
    font-family: "Montserrat", sans-serif;
    font-weight: 500;
    font-size: 18px;
    color: white;
    text-decoration: none;
    }
    header {
    background: #800000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 10%;
    }
    .logo {
    cursor: pointer;
    }
    .nav_links {
    list-style: none;
    }
    .nav_links li {
    display: inline-block;
    padding: 0px 20px;
    }
    .nav_links li a {
    transition: all 0.3s ease 0s;
    }
    .nav_links li a:hover {
    color: orange;
    }
    button {
    padding: 9px 25px;
    background-color: orange;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s ease 0s;
    }
    button:hover {
    background-color: #a36917;
    }
    /*footer*/
    .footer .footer-bottom {
    background: #343a40;
    color: #686868;
    height: 50px;
    width: 1501px;
    text-align: center;
    position: bottom;
    bottom: 0px;
    left: 0px;
    padding-top: 20px;
    margin-top: 85px;
    }
    table {
  border-collapse: collapse;
  width: 100%;

}

th, td {
  padding: 8px;
  text-align: left;
  border-bottom: 1px solid #ddd;
}

tr:hover {background-color:#f5f5f5;}
* {box-sizing: border-box}
body {font-family: Verdana, sans-serif; margin:0}
.mySlides {display: none}
img {vertical-align: middle;}

body{
  font-family:sans-serif;
}

.submission-form {
  max-width:500px;
  margin:2rem auto;
  border:3px solid #800000;
  padding:2rem;
  border-radius:5px;
  background-color: #800000;
}
  label{
    font-family: sans-serif;
    display:block;
    padding:1rem 0 .25rem;
    text-transform:uppercase;
    font-size:14px;
    color: white;
  }
  input, textarea{
    display: block;
    width:100%;
    border:2px solid orange;
    padding:.5rem;
    font-size:18px;
    border-radius:5px;
  }
  
  select {
      border: 2px solid orange;
      padding: .5rem;
      font-size: 18px;
      border-radius: 5px;
  }

#pedir{
  border: 0;
  background:orange;
  padding:.5rem;
  color:white;
  margin:1rem 0;
  width:435px;
  text-transform: uppercase;
  cursor: pointer;
  transition:.3s background ease;
  &:hover{
    background:#3498DB;
  }
}
}
  </style>
  <body>
        <header id="0">
          <img class="logo" height="70px" width="110px" src="logo.png">
          <nav>
            <ul class="nav_links">
              <li><a href="Index.html">Principal</a></li>
              <li><a href="pedidos.html">Pedidos</a></li>
              <li><a href="contato.html">Contato</a></li>
            </ul>
          </nav>
          <a class="cta" href="Index.html"><button>Voltar</button></a>
        </header>
        <div class="form">
            <form class="submission-form">
                <label for="name">
                    <b>Nome:</b>
                </label>
                <input type="text" id="name">
                <label for="adress">
                    <b>Endereço(Marilia):</b>
                </label>
                <input type="text" id="adress">
                <label for="phone">
                    <b>Celular:</b>
                </label>
                <input type="tel" id="phone">
                <label for="type">
                    <b>Tipo de Pizza:</b> 
                </label>
                <select id="type">
                    <option selected>Selecione</option>
                    <option>Napoletana(R$ 45,00)</option>
                    <option>Calabresa(R$ 45,00)</option>
                    <option>Mussarela(R$ 55,00)</option>
                    <option>Atum(R$ 35,00)</option>
                    <option>Brigadeiro(R$ 40,00)</option>
                    <option>Doce de leite(R$ 45,00)</option>
                    <option>Personalizado(R$ 60,00)</option>
                </select><br><br>
                <label for="soda">
                  <b>Refrigerante(1 por vez):</b>
                </label>
                <select id="soda">
                  <option selected>Nenhum</option>
                  <option>Coca-Cola(2L)</option>
                  <option>Fanta-Uva(2L)</option>
                  <option>Fanta-Laranja(2L)</option>
                  <option>Guarana-Antarctica(2L)</option>
                  <option>Sprite(2L)</option>
                  <option>Pepsi(2L)</option>
                </select>
                <label for="message">
                    <b>Mensagem:</b> 
                </label>
                <textarea id="message">Informações adicionais e Pizza Personalizada.</textarea>
                <b><input type="submit" value="Pedir" id="pedir"></b>
            </form>
        </div>
        <div class="footer">
          <div class="footer-bottom">
            andreircmendes@gmail.com | Desenvolvido por Andrei Mendes.
          </div>
        </div>
</body>
</html>
